services:
  - type: web
    name: family-tree-app
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn flask_app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: family-tree-db
          property: connectionString

databases:
  - name: family-tree-db
    plan: free
    region: oregon
